<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Task Work Allocation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Dashboard specific layout */
        .layout-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 2rem;
            text-align: center;
        }

        .nav-link {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--accent-color);
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .logout-btn:hover {
            background-color: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            transform: none;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .recent-section {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">TaskAllocate</div>
            <nav>
                <a href="admin-dashboard.html" class="nav-link active">Dashboard</a>
                <a href="admin-employees.html" class="nav-link">Employees</a>
                <a href="admin-tasks.html" class="nav-link">Tasks</a>
            </nav>
            <button onclick="logoutUser()" class="btn logout-btn" style="width: 100%">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Dashboard Overview</h1>
                    <p>Welcome back, <span id="adminName">Admin</span></p>
                </div>
            </header>

            <div class="stats-grid">
                <div class="glass-panel stat-card">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="stat-value" id="completedTasks" style="color: var(--success);">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="stat-value" id="pendingTasks" style="color: var(--warning);">0</div>
                    <div class="stat-label">Pending / Progress</div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="stat-value" id="totalEmployees">0</div>
                    <div class="stat-label">Employees</div>
                </div>
            </div>

            <div class="recent-section" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                <div>
                    <h2>Task Status Breakdown</h2>
                    <div class="glass-panel" style="display: flex; justify-content: center; align-items: center; min-height: 300px;">
                        <canvas id="taskStatusChart" style="max-width: 250px; max-height: 250px;"></canvas>
                    </div>
                </div>
                <div>
                    <h2>Recent Activity</h2>
                    <div class="glass-panel" style="min-height: 300px; display: flex; align-items: center; justify-content: center;">
                        <p style="text-align: center; color: var(--text-muted);">Recent tasks will appear here.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Guard route
            const user = Auth.requireAuth(['admin']);
            if (!user) return;

            document.getElementById('adminName').textContent = user.name || 'Admin';

            // Load Stats
            const tasks = Storage.get('tasks') || [];
            const users = Storage.get('users') || [];
            
            const employees = users.filter(u => u.role === 'employee');
            const completed = tasks.filter(t => t.status === 'Completed');

            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = completed.length;
            document.getElementById('pendingTasks').textContent = tasks.length - completed.length;
            document.getElementById('totalEmployees').textContent = employees.length;

            // Render Chart
            const inProgress = tasks.filter(t => t.status === 'In Progress').length;
            const pending = tasks.filter(t => t.status === 'Pending').length;
            const completedCount = completed.length;

            // If there are no tasks, show a gray placeholder
            const chartData = tasks.length > 0 ? [completedCount, inProgress, pending] : [1];
            const chartColors = tasks.length > 0 ? ['#10b981', '#3b82f6', '#f59e0b'] : ['#e2e8f0'];
            const chartLabels = tasks.length > 0 ? ['Completed', 'In Progress', 'Pending'] : ['No Tasks'];

            const ctx = document.getElementById('taskStatusChart').getContext('2d');
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        data: chartData,
                        backgroundColor: chartColors,
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '70%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: isDark ? '#f8fafc' : '#475569',
                                padding: 20,
                                font: {
                                    family: "'Inter', sans-serif"
                                }
                            }
                        }
                    }
                }
            });
        });

        window.logoutUser = () => {
            Auth.logout();
        };
    </script>
</body>
</html>
