<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees - Task Work Allocation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <style>
        /* Specific styles */
        .layout-container { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar-bg); backdrop-filter: var(--glass-blur); border-right: 1px solid var(--border-color); padding: 2rem 1rem; display: flex; flex-direction: column; }
        .sidebar-logo { font-size: 1.25rem; font-weight: 700; color: var(--accent-color); margin-bottom: 2rem; text-align: center; }
        .nav-link { display: block; padding: 0.75rem 1rem; color: var(--text-main); text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; transition: all 0.3s ease; }
        .nav-link:hover, .nav-link.active { background-color: var(--accent-color); color: white; }
        .logout-btn { margin-top: auto; background-color: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        /* Table styles */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 1rem; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; font-size: 0.875rem; }
        tr:hover { background: var(--hover-bg); }
        
        .action-btn { padding: 0.4rem 0.8rem; font-size: 0.875rem; border: none; border-radius: 4px; cursor: pointer; margin-right: 0.5rem; }
        .btn-edit { background: rgba(59, 130, 246, 0.2); color: var(--accent-color); }
        .btn-edit:hover { background: var(--accent-color); color: white; }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Modal styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { width: 100%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">TaskAllocate</div>
            <nav>
                <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
                <a href="admin-employees.html" class="nav-link active">Employees</a>
                <a href="admin-tasks.html" class="nav-link">Tasks</a>
            </nav>
            <button onclick="logoutUser()" class="btn logout-btn" style="width: 100%">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Manage Employees</h1>
                    <p>View and add employees to the system.</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Add Employee</button>
            </header>

            <div style="margin-bottom: 1rem;">
                <input type="text" id="searchEmployee" class="form-control" placeholder="Search by name, username, or department..." oninput="renderEmployees()" style="max-width: 400px;">
            </div>

            <div class="glass-panel table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Department</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <!-- Employee rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal" id="addEmployeeModal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h2>Add New Employee</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="addEmployeeForm">
                <div class="form-group">
                    <label class="form-label" for="empName">Full Name</label>
                    <input type="text" id="empName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="empUsername">Username (for login)</label>
                    <input type="text" id="empUsername" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="empPassword">Password</label>
                    <input type="password" id="empPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="empDept">Department</label>
                    <input type="text" id="empDept" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Save Employee</button>
            </form>
        </div>
    </div>

    <!-- Edit Employee Modal -->
    <div class="modal" id="editEmployeeModal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h2>Edit Employee</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editEmployeeForm">
                <input type="hidden" id="editEmpId">
                <div class="form-group">
                    <label class="form-label" for="editEmpName">Full Name</label>
                    <input type="text" id="editEmpName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editEmpUsername">Username (for login)</label>
                    <input type="text" id="editEmpUsername" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editEmpPassword">Password</label>
                    <input type="text" id="editEmpPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editEmpDept">Department</label>
                    <input type="text" id="editEmpDept" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.requireAuth(['admin']);
            if (!user) return;
            renderEmployees();
        });

        function renderEmployees() {
            const users = Storage.get('users') || [];
            const searchTerm = document.getElementById('searchEmployee').value.toLowerCase();
            
            const employees = users.filter(u => {
                if (u.role !== 'employee') return false;
                if (!searchTerm) return true;
                return u.name.toLowerCase().includes(searchTerm) || 
                       u.username.toLowerCase().includes(searchTerm) || 
                       (u.department && u.department.toLowerCase().includes(searchTerm));
            });

            const tbody = document.getElementById('employeeTableBody');
            
            if (employees.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No employees found.</td></tr>`;
                return;
            }

            tbody.innerHTML = employees.map(emp => `
                <tr>
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.username}</td>
                    <td>${emp.department || 'N/A'}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick="openEditModal('${emp.id}')">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteEmployee('${emp.username}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // Modal functions
        function openModal() { document.getElementById('addEmployeeModal').classList.add('active'); }
        function closeModal() { document.getElementById('addEmployeeModal').classList.remove('active'); document.getElementById('addEmployeeForm').reset(); }

        document.getElementById('addEmployeeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('empName').value.trim();
            const username = document.getElementById('empUsername').value.trim();
            const password = document.getElementById('empPassword').value.trim();
            const department = document.getElementById('empDept').value.trim();

            const users = Storage.get('users') || [];
            if (users.some(u => u.username === username)) {
                alert('Username already exists!');
                return;
            }

            const newEmployee = {
                id: 'EMP-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0'),
                name,
                username,
                password,
                department,
                role: 'employee'
            };

            users.push(newEmployee);
            Storage.save('users', users);
            closeModal();
            renderEmployees();
        });

        window.deleteEmployee = (username) => {
            if(confirm('Are you sure you want to delete this employee?')) {
                let users = Storage.get('users') || [];
                users = users.filter(u => u.username !== username);
                Storage.save('users', users);
                renderEmployees();
            }
        };

        // Edit Modal logic
        window.openEditModal = (empId) => {
            const users = Storage.get('users') || [];
            const emp = users.find(u => u.id === empId);
            if (!emp) return;

            document.getElementById('editEmpId').value = emp.id;
            document.getElementById('editEmpName').value = emp.name;
            document.getElementById('editEmpUsername').value = emp.username;
            document.getElementById('editEmpPassword').value = emp.password;
            document.getElementById('editEmpDept').value = emp.department || '';

            document.getElementById('editEmployeeModal').classList.add('active');
        };

        window.closeEditModal = () => {
            document.getElementById('editEmployeeModal').classList.remove('active');
            document.getElementById('editEmployeeForm').reset();
        };

        document.getElementById('editEmployeeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editEmpId').value;
            const name = document.getElementById('editEmpName').value.trim();
            const username = document.getElementById('editEmpUsername').value.trim();
            const password = document.getElementById('editEmpPassword').value.trim();
            const department = document.getElementById('editEmpDept').value.trim();

            let users = Storage.get('users') || [];
            
            // Check if username is taken by another user
            if (users.some(u => u.username === username && u.id !== id)) {
                alert('Username already exists!');
                return;
            }

            const index = users.findIndex(u => u.id === id);
            if (index !== -1) {
                users[index].name = name;
                users[index].username = username;
                users[index].password = password;
                users[index].department = department;
                Storage.save('users', users);
            }
            
            closeEditModal();
            renderEmployees();
        });

        window.logoutUser = () => { Auth.logout(); };
    </script>
</body>
</html>
